{% extends 'frontend.html' %}
{% block content %}
<h2>{% if form.instance.pk %}Editar{% else %}Crear{% endif %} Producto</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    {{ image_form.as_p }}

    <button type="submit" class="btn btn-success">{% if form.instance.pk %}Guardar Cambios{% else %}Añadir Producto{% endif %}</button>
</form>
{% endblock %}
