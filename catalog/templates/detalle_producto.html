{% extends 'frontend.html' %}

{% block content %}
<h2>{{ producto.nombre | capfirst }}</h2>
{% for image in producto.images.all %}
<img src="{{ image.image.url }}" alt="{{ producto.nombre }}" />
{% endfor %}
    <p>{{ producto.descripcion }}</p>
    <p><strong>Precio:</strong> ${{ producto.precio }}</p>
    <p><strong>Categoría:</strong> {{ producto.categoria }}</p>
{% endblock %}
