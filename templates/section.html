{% load static %}

<style>
  /* --- Hero principal --- */
  .hero-lbcc {
    position: relative;
    width: 100vw;
    height: 80vh;
    background-color: #0d6efd;
    margin: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff;
  }

  /* --- Semicírculos laterales --- */
  .hero-lbcc::before,
  .hero-lbcc::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 20%;
    height: 150%;
    background-color: #ffffff;
    border-radius: 50%;
    transform: translateY(-50%);
    opacity: 0.95;
  }
  .hero-lbcc::before { left: -10%; box-shadow: 10px 0 25px rgba(0, 0, 0, 0.1); }
  .hero-lbcc::after { right: -10%; box-shadow: -10px 0 25px rgba(0, 0, 0, 0.1); }

  /* --- Contenido --- */
  .logo-lbcc {
    width: 180px;
    height: auto;
    animation: giroMoneda 3s ease-in-out 1;
    transform-style: preserve-3d;
  }
  @keyframes giroMoneda {
    0% { transform: rotateY(0deg); }
    50% { transform: rotateY(360deg); }
    100% { transform: rotateY(360deg); }
  }
  .bienvenido-titulo {
    font-size: 2rem;
    line-height: 1.4;
    text-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .resaltado { color: #ffde59; font-weight: 600; }
  .lema {
    font-size: 1.1rem;
    opacity: 0.95;
    font-style: italic;
    max-width: 600px;
    margin: 0 auto;
  }

  /* --- Diamantes animados --- */
  .diamante {
    position: absolute;
    width: 10px;
    height: 10px;
    transform: rotate(45deg);
    opacity: 0;
    animation: flotar 6s ease-in-out infinite;
  }

  @keyframes flotar {
    0%, 100% { opacity: 0; transform: translateY(0) rotate(45deg) scale(0.5); }
    50% { opacity: 1; transform: translateY(-20px) rotate(45deg) scale(1); }
  }

  /* --- Responsivo --- */
  @media (max-width: 768px) {
    .hero-lbcc::before,
    .hero-lbcc::after { width: 100px; height: 200px; }
    .bienvenido-titulo { font-size: 1.5rem; }
    .logo-lbcc { width: 130px; }
  }

  /* Ocultar semicírculos en tablets y móviles */
@media (max-width: 992px) {
  .hero-lbcc::before,
  .hero-lbcc::after {
    display: none;
  }
}
@media (max-width: 768px) {
  .hero-lbcc {
    height: 60vh;
  }
}

</style>

<section class="hero-lbcc container-fluid">
  <!-- Contenedor de partículas -->
  <div id="diamantes-container"></div>

  <div class="contenido-hero">
    <div class="icono-decoracion mb-4">
      <img src="{% static 'setting/logo.png' %}" alt="Logo Living Better CC" class="logo-lbcc rounded-4" />
    </div>
    <h3 class="bienvenido-titulo fw-semibold">
      Somos Agentes de Cambios,<br>
      <span class="resaltado">Mejorando las familias</span>
    </h3>
    <p class="lema mt-3">
      “Es mejor construir una cerca en la cima de una montaña que un hospital en la parte baja de la misma.”
    </p>
  </div>
</section>

<script>
  // Generador de diamantes aleatorios
  document.addEventListener("DOMContentLoaded", () => {
    const container = document.getElementById("diamantes-container");

    const crearDiamante = (color) => {
      const d = document.createElement("div");
      d.classList.add("diamante");
      d.style.backgroundColor = color;
      d.style.top = Math.random() * 100 + "%";
      d.style.left = Math.random() * 100 + "%";
      d.style.animationDelay = Math.random() * 5 + "s";
      d.style.animationDuration = 4 + Math.random() * 4 + "s";
      container.appendChild(d);
      // eliminar después de un tiempo para evitar saturación
      setTimeout(() => d.remove(), 9000);
    };

    // Generar aleatoriamente cada cierto tiempo
    setInterval(() => {
      // Diamantes blancos (zona azul)
      crearDiamante("rgba(255,255,255,0.8)");
      // Diamantes azules (zona blanca)
      crearDiamante("#0d6efd");
    }, 500);
  });
</script>
