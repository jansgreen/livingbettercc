{% extends "frontend.html" %}
{% load static %}

{% block content %}
<h1>{{ form.instance.pk|yesno:"Actualizar dirección,Crear dirección" }}</h1>
<form method="post">
        {% csrf_token %}
        {{ form.as_p }}

    </form>
{% endblock %}
