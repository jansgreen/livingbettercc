{% extends 'dashboard.html' %}    

{% block content %}
<h2>Eliminar Categoría</h2>
<p>¿Estás seguro de que deseas eliminar la categoría "{{ object.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
</form>
<a href="{% url 'category_list' %}">Cancelar</a>
{% endblock %}
