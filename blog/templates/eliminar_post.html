
{% extends 'frontend.html'%}

{% block content %}
<h2>Eliminar Post</h2>
<p>¿Estás seguro que deseas eliminar el post "{{ post.titulo }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Eliminar</button>
</form>
<a href="{% url 'detalle_post' post.pk %}">Cancelar</a>

{% endblock %}
