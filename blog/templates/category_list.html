{% extends 'dashboard.html' %}    

{% block content %}
<h2>Lista de Categorías</h2>
<a href="{% url 'category_create' %}">Crear Nueva Categoría</a>
<ul>
    {% for category in categories %}
    <li>
        <strong>{{ category.name }}</strong><br>
        {{ category.description }}<br>
        <a href="{% url 'category_edit' category.pk %}">Editar</a> |
        <a href="{% url 'category_delete' category.pk %}">Eliminar</a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
