{% extends 'dashboard.html' %}

{% block content %}
<div class="container py-4">
  <div class="card" style="max-width: 500px; margin: 0 auto;">
    <div class="card-body p-4">
      <h3 class="card-title mb-3">Confirmar eliminación</h3>

      <div class="alert alert-warning">
        ¿Estás seguro que deseas eliminar <strong>{{ file_type }}</strong>?
      </div>

      <p class="text-muted mb-4">
        Esta acción no se puede deshacer. El archivo será removido de tu perfil.
      </p>

      <div class="d-flex gap-2">
        <form method="post" style="flex: 1;">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger w-100">
            <i class="bi bi-trash"></i> Eliminar
          </button>
        </form>
        <a href="{% url 'authentication:profile_update' profile.pk %}" class="btn btn-secondary w-100">
          <i class="bi bi-x"></i> Cancelar
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
