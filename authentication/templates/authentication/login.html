{% extends 'frontend.html' %}

{% block content %}

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="col-4">
        <h2>Login</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">Login</button>
            <a class="btn btn-success" href="{% url 'authentication:register' %}">Crearme una cuenta</a>
        </form>
    </div>
</div>
{% endblock %}
