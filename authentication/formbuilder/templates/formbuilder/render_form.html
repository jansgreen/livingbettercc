{% extends "frontend.html" %}
{% load static %}
{% block content %}
<div class="container py-4">
  <h2>{{ form_name }}</h2>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
      <label for="{{ field.id_for_label }}" class="form-label">{{ field.label |capfirst }}</label>
      {{ field }}
      {% if field.help_text %}
      <div class="form-text">{{ field.help_text }}</div>
      {% endif %}
    </div>
    {% endfor %}

    <button type="submit" class="btn btn-primary">Enviar</button>
  </form>
  <a class="btn btn-secondary" href="{% url 'formbuilder:form_list' %}">Volver a la lista</a>
</div>
{% endblock %}
