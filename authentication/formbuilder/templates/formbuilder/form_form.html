{% extends "dashboard.html" %}
{% block content %}
<h1>{% if form.instance.pk %}Editar{% else %}Crear{% endif %} Formulario</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar</button>
</form>
<a href="{% url 'formbuilder:form_list' %}">Volver a la lista</a>
{% endblock %}
