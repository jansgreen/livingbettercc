{% extends "dashboard.html" %}
{% load static %}
{% block content %}
<h1>Eliminar formulario</h1>
<p>¿Estás seguro de que deseas eliminar "{{ object.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
    <a href="{% url 'formbuilder:form_detail' object.pk %}">Cancelar</a>
</form>
{% endblock %}
