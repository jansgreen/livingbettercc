<!-- templates/certificates/public_certificate.html -->
{% extends "dashboards/dashboard.html" %}
{% load static %}
{% block content %}
<div style="position:relative; width:900px; height:650px; margin:auto;">
  <img src="{% static 'certificates/certificados_regional.png' %}" alt="Certificado fondo" style="position:absolute; top:0; left:0; width:900px; height:650px; object-fit:cover; z-index:0;">
  <!-- Nombre del usuario -->
  <div style="position:absolute; top:330px; left:0; width:100%; text-align:center; font-size:2.2em; font-weight:bold; color:#2a2a2a; letter-spacing:1px; z-index:2;">
    {{ user.get_full_name }}
  </div>
  <!-- Título del curso -->
  <div style="position:absolute; top:380px; left:0; width:100%; text-align:center; font-size:1.5em; color:#3a7bd5; z-index:2;">
    {{ course.title }}
  </div>
  <!-- Fecha -->
  <div style="position:absolute; top:430px; left:0; width:100%; text-align:center; font-size:1.2em; color:#444; z-index:2;">
    Fecha: {{ date|date:"d/m/Y" }}
  </div>
</div>
{% endblock %}
<style>
  /* Ajustes para posicionar los datos sobre el fondo */
  body {
    background: #eaf4ff;
  }
</style>
