{% extends "classroom/classroom.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 900px;">
  <h3 class="mb-3">
    {% if mode == 'edit' %}Editar Registro Presencial{% else %}Nuevo Registro Presencial{% endif %}
  </h3>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success">Guardar</button>
          <a href="{% url 'certifications:inperson_list' %}" class="btn btn-secondary">Volver</a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
