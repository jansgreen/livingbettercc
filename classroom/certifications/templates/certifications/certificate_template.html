{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Certificado</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        .cert-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: url("{% static 'certificados/certificado.png' %}") no-repeat center center;
            background-size: cover;
        }
        .cert-content {
            position: absolute;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #222;
        }
        .cert-title {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 1em;
        }
        .cert-user {
            font-size: 2em;
            margin-bottom: 0.5em;
        }
        .cert-course {
            font-size: 1.5em;
            margin-bottom: 0.5em;
        }
        .cert-date {
            font-size: 1.2em;
            margin-top: 1em;
        }
    </style>
</head>
<body>
    <div class="cert-bg"></div>
    <div class="cert-content">
        <div class="cert-title">Certificado de Finalización</div>
        <div class="cert-user">{{ user.get_full_name }}</div>
        <div class="cert-course">por completar el curso: <strong>{{ course.title }}</strong></div>
        <div class="cert-date">Fecha: {{ date }}</div>
    </div>
</body>
</html>
