{% extends "dashboard.html" %}
{% block content %}
<div class="container py-4" style="max-width:820px;">
  <h3 class="mb-3">{% if mode == "update" %}Edit Certificate{% else %}New Certificate{% endif %}</h3>

  {% if certificate %}
    <div class="alert alert-info">
      <b>Cert No:</b> {{ certificate.cert_no }} |
      <b>UUID:</b> {{ certificate.uuid }}
    </div>
  {% endif %}

  <div class="card p-3">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-outline-secondary" href="{% url 'courses:my_course' %}">Back</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
