{% extends 'dashboard.html' %}    

{% block content %}
  <h1>{{ object.title }}</h1>
  <p>{{ object.description }}</p>
  <p>Course: {{ object.course.title }}</p>
  <a href="{% url 'module_update' object.pk %}">Edit</a>
  <a href="{% url 'module_delete' object.pk %}">Delete</a>
  <a href="{% url 'module_list' %}">Back to list</a>
{% endblock %}
