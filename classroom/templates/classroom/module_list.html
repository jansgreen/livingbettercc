{% extends "base_generic.html" %}

{% block content %}
  <h1>Modules</h1>
  <ul>
    {% for module in object_list %}
      <li>
        <a href="{% url 'module_detail' module.pk %}">{{ module.title }}</a>
      </li>
    {% endfor %}
  </ul>
  <a href="{% url 'module_create' %}">Create new module</a>
{% endblock %}
