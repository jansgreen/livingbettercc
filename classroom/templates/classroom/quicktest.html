{% extends "dashboard.html" %}
{% block content %}
<div class="container mt-3">
  <h2>Prueba rápida: {{ module.title }}</h2>
  {% if test %}
  <form method="post">
    {% csrf_token %}
    {% for q in test.questions.all %}
      <div class="mb-3">
        <p><strong>{{ forloop.counter }}.</strong> {{ q.text|safe }}</p>
        <div class="form-check"><input class="form-check-input" type="radio" name="question_{{ q.id }}" value="A" id="q{{q.id}}A"><label class="form-check-label" for="q{{q.id}}A">{{ q.option_a }}</label></div>
        <div class="form-check"><input class="form-check-input" type="radio" name="question_{{ q.id }}" value="B" id="q{{q.id}}B"><label class="form-check-label" for="q{{q.id}}B">{{ q.option_b }}</label></div>
        <div class="form-check"><input class="form-check-input" type="radio" name="question_{{ q.id }}" value="C" id="q{{q.id}}C"><label class="form-check-label" for="q{{q.id}}C">{{ q.option_c }}</label></div>
        <div class="form-check"><input class="form-check-input" type="radio" name="question_{{ q.id }}" value="D" id="q{{q.id}}D"><label class="form-check-label" for="q{{q.id}}D">{{ q.option_d }}</label></div>
      </div>
    {% endfor %}
    <button class="btn btn-primary" type="submit">Enviar</button>
  </form>
  {% else %}
    <div class="alert alert-info">Este módulo no tiene test.</div>
  {% endif %}
</div>
{% endblock %}
