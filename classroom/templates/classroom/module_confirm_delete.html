{% extends 'dashboard.html' %}    

{% block content %}
  <h1>Delete Module</h1>
  <p>Are you sure you want to delete "{{ object.title }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Confirm</button>
  </form>
  <a href="{% url 'module_list' %}">Cancel</a>
{% endblock %}
