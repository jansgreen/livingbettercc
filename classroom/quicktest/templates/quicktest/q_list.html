{% extends 'dashboard.html' %}
{% block content %}
<div class="container mt-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Preguntas de: {{ qdef.title }} ({{ qdef.module.title }})</h2>
    <a href="{% url 'quicktest:q_create' qdef.id %}" class="btn btn-primary btn-sm">Agregar pregunta</a>
  </div>
  <table class="table table-striped align-middle">
    <thead>
      <tr>
        <th>Pregunta</th>
        <th class="text-end">Acciones</th>
      </tr>
    </thead>
    <tbody>
      {% for q in questions %}
        <tr>
          <td>{{ q.text|truncatechars:120 }}</td>
          <td class="text-end">
            <a href="{% url 'quicktest:q_update' q.id %}" class="btn btn-warning btn-sm">Editar</a>
            <a href="{% url 'quicktest:q_delete' q.id %}" class="btn btn-danger btn-sm">Eliminar</a>
          </td>
        </tr>
      {% empty %}
        <tr><td colspan="2" class="text-muted">No hay preguntas.</td></tr>
      {% endfor %}
    </tbody>
  </table>
  <a href="{% url 'quicktest:qdef_list' %}" class="btn btn-outline-secondary btn-sm">Volver</a>
</div>
{% endblock %}
