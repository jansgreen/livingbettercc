{% extends 'base.html' %}
{% block content %}
<h2>Realizar QuickTest para {{ module.title }}</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="score" class="form-label">Puntaje</label>
        <input type="number" step="0.01" min="0" max="100" name="score" id="score" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success">Guardar QuickTest</button>
</form>
{% endblock %}
