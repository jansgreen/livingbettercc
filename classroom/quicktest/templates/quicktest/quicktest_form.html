{% extends 'dashboard.html' %}
{% block content %}
<div class="container mt-4">
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <h3 class="mb-3">Editar resultado QuickTest</h3>
      <p class="text-muted mb-3"><strong>Módulo:</strong> {{ test.module.title }}</p>

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="score" class="form-label">Puntaje (0-100)</label>
          <input
            type="number"
            step="0.01"
            min="0"
            max="100"
            name="score"
            id="score"
            class="form-control"
            value="{{ test.score }}"
            required
          >
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Guardar</button>
          <a href="{% url 'quicktest:quicktest_detail' test.pk %}" class="btn btn-outline-secondary">Volver</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
