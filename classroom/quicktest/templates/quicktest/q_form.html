{% extends 'dashboard.html' %}
{% block content %}
<div class="container mt-3">
  <h2>{% if question %}Editar pregunta{% else %}Agregar pregunta{% endif %}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Guardar</button>
    <a href="{% url 'quicktest:q_list' qdef.id %}" class="btn btn-outline-secondary">Cancelar</a>
  </form>
</div>
{% endblock %}
