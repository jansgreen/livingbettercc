{% extends "classroom/classroom.html" %}
{% block content %}
<div class="container mt-4">
  <h1>Eliminar Módulo</h1>
  <p>¿Seguro que deseas eliminar el módulo "{{ object.title }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a href="{% url 'courses:modules-detail' object.pk %}" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
{% endblock %}
