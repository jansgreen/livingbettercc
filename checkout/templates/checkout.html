{% extends 'frontend.html' %}
{% block content %}
<h1>Checkout</h1>
<form method="POST">
    {% csrf_token %}
    <div>
        <label for="direccion_envio">Dirección de Envío:</label>
        <input type="text" id="direccion_envio" name="direccion_envio" required>
    </div>
    <h2>Total: {{ total }}</h2>
    <button type="submit" class="btn btn-success">Confirmar Pedido</button>
</form>
{% endblock %}
