{% extends 'frontend.html' %}

{% block content %}
<h2>Lista de Contenidos de Página</h2>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>Título</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for content in page_contents %}
            <tr>
                <td><a href="{% url 'edit_page_content' content.id %}">{{ content.title }}</a></td>
                <td>
                    <a href="{% url 'edit_page_content' content.id %}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="{% url 'delete_page_content' content.id %}" class="btn btn-danger btn-sm" onclick="return confirm('¿Estás seguro de que quieres eliminar este contenido?');">Eliminar</a>
                </td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="2">No hay contenidos disponibles.</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
