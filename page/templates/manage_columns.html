{% extends 'frontend.html' %}

{% block content %}
<h2>Agregar Columna</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}  <!-- Renderiza los campos del formulario -->
    <button type="submit" class="btn btn-primary">Agregar Columna</button>
</form>

<h2>Lista de Columnas</h2>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for column in columns %}
            <tr>
                <td>{{ column.name }}</td>
                <td>
                    <a href="{% url 'edit_column' column.id %}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="{% url 'delete_column' column.id %}" class="btn btn-danger btn-sm" onclick="return confirm('¿Estás seguro de que quieres eliminar esta columna?');">Eliminar</a>
                </td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="2">No hay columnas disponibles.</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
