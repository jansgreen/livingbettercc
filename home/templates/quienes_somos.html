{% extends 'frontend.html' %}
{% load static %}
{% block content %}
    <div class="row justify-content-md-center">
            <div class="col col-md-8">
                {% for items in posts %}
                <a href="{% url 'single_page' items.id %}" class="list-group-item list-group-item-action">
                  <h2>{{items.category}}</h2>
                  <div class="card border border-0 mb-3 mt-5" style="max-width:540px;">
                      <div class="row g-0">
                        <div class="col-md-4">
                          <img src="{{items.cover_image.url}}" max-width="300px" max-height="400px" alt="" class="img-fluid me-2"/>
                      </div>
                        <div class="col-md-8">
                          <div class="card-body">
                              <h5 class="card-title">{{items.title |capfirst}}</h5>
                            <p class="card-text">{{items.summary |capfirst|striptags}} </p>
                          </div>
                        </div>
                      </div>
                    </div>
                  </a>
                {% endfor %}
            </div>
            <div class="col col-md-4">
                {% include 'manager.html'%}
            </div>
        </div>
{% endblock %}
