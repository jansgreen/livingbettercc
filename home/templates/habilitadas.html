{%load static %}
<div class="container text-center mt-5">
  <div class="row justify-content-md-center">
    <h2 class="pb-2 border-bottom">Habilitada/Certificada Por</h2>
      {% for post in posts %}
        {% if post.position.column == 3 %}
          <div class="col-12 col-md-6">
            <i class="bi bi-bank2 text-primary display-6"></i>
            <h3 class="fs-2">{{post.title}}</h3>
            <picture>
              <img src="{{ post.cover_image.url }}" alt="{{post.cover_image.name}}" class="img-fluid" onerror="this.onerror=null; this.src='{% static ' post.cover_image.urls' %}'"/>
            </picture>
            <p><small>{{post.content|safe}}</small>
          </div>
        {% endif %}
      {% endfor %}
  </div>
</div>
