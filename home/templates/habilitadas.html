{%load static %}
<div class="container text-center mt-5">
  <div class="row justify-content-md-center">
    <h2 class="pb-2 border-bottom">Habilitada/Certificada Por</h2>
    {% if habilidades %}
      {% for habilidad in habilidades %}
        <div class="col-12 col-md-6">
          <i class="bi bi-bank2 text-primary display-6"></i>
          <h3 class="fs-2">{{habilidad.category.nombre}}</h3>
          <picture>
            <img src="{{ habilidad.imagen.url }}" alt="{{habilidad.category.nombre}}" class="img-fluid" onerror="this.onerror=null; this.src='{% static ' habilidad.imagen.urls' %}'"/>
          </picture>
          <p><small>{{habilidad.details}}</small>
        </div>
      {% endfor %}

    {% endif %}
  </div>
</div>
