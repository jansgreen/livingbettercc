{% extends 'frontend.html' %}
{%load static %}
{% block content %}

<div class="container-fluid">
    <div class="row  mt-5">
        <div class="row mb-5">
            <h1 class="text-primary"> Living Better Community Center </h1>
        </div>

        <hr class="mb-5 border opacity-80 desg-hr">

        <div class="row justify-content-md-center">
          {% include 'columnamainhome.html'%}
    </div>
    <div class="row">
        <h2 class="pb-2 border-bottom mt-5">Actividades</h2>

        <div id="carouselExampleControls" class="carousel slide bg-dark mt-5" data-bs-ride="carousel">
            <div class="carousel-inner justify-content-center">
              <div class="carousel-item active">
                <img src={% static 'setting/actividad1.jpeg' %} class="d-block w-50 mt-5 mb-5  ms-auto me-auto rounded" alt="...">
              </div>
              <div class="carousel-item">
                <img src={% static 'setting/actividad2.jpeg' %} class="d-block w-50 mt-5 mb-5  ms-auto me-auto rounded" alt="...">
              </div>
              <div class="carousel-item">
                <img src={% static 'setting/actividad3.jpeg' %} class="d-block w-50 mt-5 mb-5 ms-auto me-auto rounded" alt="...">
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Next</span>
            </button>
          </div>
        </div>

        {% include 'habilitadas.html'%}


    </div>
</div>


{% endblock %}
