{% extends 'dashboard.html' %}
{% block content %}
<div class="container mt-4">
  <h2>{% if category %}Editar{% else %}Crear{% endif %} Categoría de Reporte</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Guardar</button>
    <a href="{% url 'report_categories_list' %}" class="btn btn-secondary">Cancelar</a>
  </form>
  {% if messages %}
    <ul class="mt-3">
      {% for message in messages %}
        <li class="text-danger">{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}
</div>
{% endblock %}
