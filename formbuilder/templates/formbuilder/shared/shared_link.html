{% extends 'dashboard.html' %}
{% load static %}
{% block content %}
  <div class="container py-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h5 mb-2">Enlace para compartir</h1>
        <p class="text-muted mb-3">Comparte este enlace con los t&#233;cnicos o facilitadores.</p>

        <div class="input-group mb-3">
          <input type="text" id="shareUrl" class="form-control" value="{{ share_url }}" readonly>
          <button class="btn btn-outline-secondary" type="button" id="copyBtn">Copiar</button>
        </div>

        <div class="d-flex gap-2 mb-4">
          <a href="{{ share_url }}" target="_blank" class="btn btn-primary">Abrir enlace (prueba)</a>
          <a href="{% url 'formbuilder:completed_forms_list' %}" class="btn btn-link">Volver a listados</a>
        </div>

        <div class="border-top pt-3">
          <h2 class="h6 mb-2">Enviar por email</h2>
          <form method="post">
            {% csrf_token %}
            <div class="row g-2 align-items-end">
              <div class="col-12 col-md-6">
                <label for="inviteEmail" class="form-label">Email del usuario</label>
                <input type="email" id="inviteEmail" name="email" class="form-control" placeholder="correo@ejemplo.com" required>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">Enlace</label>
                <input type="text" class="form-control" value="{{ share_url }}" readonly>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-success">Enviar enlace</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const copyBtn = document.getElementById('copyBtn');
      copyBtn.addEventListener('click', function () {
        const input = document.getElementById('shareUrl');
        input.select();
        input.setSelectionRange(0, 99999);
        try {
          document.execCommand('copy');
          copyBtn.innerText = 'Copiado';
          setTimeout(() => copyBtn.innerText = 'Copiar', 2000);
        } catch (e) {
          alert('Por favor selecciona y copia el enlace manualmente.');
        }
      });
    });
  </script>
{% endblock %}
