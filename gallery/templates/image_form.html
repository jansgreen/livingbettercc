{% extends 'backend/backend.html' %}

{% block content %}
<div class="container">
    <h2>{% if image %}Actualizar Imagen{% else %}Agregar Imagen{% endif %}</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">{% if image %}Actualizar{% else %}Guardar{% endif %}</button>
        <a href="{% url 'image_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
