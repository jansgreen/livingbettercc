{% extends 'dashboard.html' %}

{% block content %}
<div class="container">
    <h2>Confirmar Eliminación</h2>
    <p>¿Estás seguro de que deseas eliminar la imagen "{{ image.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="{% url 'image_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
