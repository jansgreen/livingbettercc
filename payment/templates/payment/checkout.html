{% extends 'frontend.html' %}


{% block content %}

<div class="row">
  <div class="col-sm-6 mb-3 mb-sm-0">
    <div class="card">
      <div class="card-header">
        Billing Info
      </div>
      <div class="card-body">
        <form method="POST" action="{% url 'process_payment' %}">
          {% csrf_token %}
          {{ shipping_form.as_p }}

          <hr>
          <h5>Payment Details</h5>
          <div class="mb-3">
            <label for="card_number" class="form-label">Card Number</label>
            <input type="text" name="card_number" id="card_number" class="form-control" required>
          </div>
          <div class="row">
            <div class="col">
              <label for="exp_date" class="form-label">Expiration Date</label>
              <input type="text" name="exp_date" id="exp_date" class="form-control" placeholder="MM/YY" required>
            </div>
            <div class="col">
              <label for="cvv" class="form-label">CVV</label>
              <input type="text" name="cvv" id="cvv" class="form-control" required>
            </div>
          </div>
          <div class="mb-3">
            <label for="card_name" class="form-label">Name on Card</label>
            <input type="text" name="card_name" id="card_name" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-secondary">
            Pay ${{ totals }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>


{% endblock %}
