{% extends 'frontend.html' %}

{% block content %}
<h2>Lista de Categorías</h2>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Descripción</th>
        </tr>
    </thead>
    <tbody>
        {% for categoria in categorias %}
        <tr>
            <td>{{ categoria.nombre }}</td>
            <td>{{ categoria.descripcion }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<a href="{% url 'crear_categoria' %}" class="btn btn-primary">Crear Nueva Categoría</a>
{% endblock %}
