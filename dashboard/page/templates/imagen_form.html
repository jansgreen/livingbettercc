<!-- habilidades/imagen_form.html -->
{% extends 'dashboard.html' %}    

{% block content %}
<div class="container">
    <h2>Agregar Imagen a "{{ category.nombre }}"</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Agregar</button>
    </form>
    <a href="{% url 'page:img_category_list' %}" class="btn btn-secondary mt-3">Volver</a>
</div>
{% endblock %}
