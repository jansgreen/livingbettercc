{% extends 'dashboard.html' %}    

    {% block content %}
    <h2>Eliminar Contenido: {{ content.title }}</h2>
    <p>¿Estás seguro de que quieres eliminar este contenido?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
    </form>
    <a href="{% url 'page_content_list' %}" class="btn btn-secondary">Cancelar</a>
    {% endblock %}
