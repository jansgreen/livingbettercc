<!-- habilidades/imagen_confirm_delete.html -->
{% extends 'dashboard.html' %}    

{% block content %}
<div class="container">
    <h2>Eliminar Imagen</h2>
    <p>¿Estás seguro de que deseas eliminar esta imagen?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="{% url 'page:page_img_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
