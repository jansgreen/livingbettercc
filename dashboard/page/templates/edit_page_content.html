{% extends 'dashboard.html' %}    

{% block content %}
<h2>Editar Contenido: {{ content.title }}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}  <!-- Renderiza los campos del formulario -->
    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
</form>
<a href="{% url 'page:page_content_list' %}" class="btn btn-secondary">Cancelar</a>
{% endblock %}
