{% extends 'dashboard.html' %}    

{% block content %}
<h2>Eliminar Columna: {{ column.name }}</h2>
<p>¿Estás seguro de que quieres eliminar esta columna?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
</form>
<a href="{% url 'page:manage_columns' %}" class="btn btn-secondary">Cancelar</a>
{% endblock %}
