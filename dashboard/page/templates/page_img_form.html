<!-- habilidades/page_img_form.html -->
{% extends 'dashboard.html' %}    

{% block content %}
<div class="container">
    <h2>{% if form.instance.pk %}Editar{% else %}Agregar{% endif %} Habilidad</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Guardar</button>
    </form>
    <a href="{% url 'img_category_list' %}" class="btn btn-secondary mt-3">Volver</a>
</div>
{% endblock %}
