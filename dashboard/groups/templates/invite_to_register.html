
{% extends 'dashboard.html' %}
{% load static %}
{% block content %}
<div class="container py-5 animate__animated animate__fadeIn">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white d-flex align-items-center">
                    <i class="fas fa-user-plus fa-lg me-2"></i>
                    <h4 class="mb-0">Invitar a un Grupo</h4>
                </div>
                <div class="card-body">
                    <form method="POST" autocomplete="off">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <input type="email" name="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="group" class="form-label">Grupo</label>
                            <select name="group" class="form-select" id="group" required>
                                {% for group in groups %}
                                <option value="{{ group.name }}">{{ group.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg w-100 animate__animated animate__pulse">
                            <i class="fas fa-paper-plane"></i> Enviar Invitación
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
