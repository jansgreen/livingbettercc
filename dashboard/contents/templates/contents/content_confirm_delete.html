{% extends 'dashboard.html' %}
{% load static %}

{% block content %}
<div class="container">
    <h1>Confirm Delete</h1>
    <p>Are you sure you want to delete the content <strong>{{ content.title }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'contents:ContentListView' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
