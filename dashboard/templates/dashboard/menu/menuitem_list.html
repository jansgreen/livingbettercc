{% extends "dashboard.html" %}

{% block content %}
<h1>Menu Items</h1>
<a href="{% url 'menuitem_create' %}">Create New Menu Item</a>
<table>
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Orden</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
        <tr>
            <td>{{ item.nombre }}</td>
            <td>{{ item.categoria }}</td>
            <td>{{ item.orden }}</td>
            <td>
                <a href="{% url 'menuitem_update' item.pk %}">Edit</a>
                <a href="{% url 'menuitem_delete' item.pk %}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
