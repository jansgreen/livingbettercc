{% extends 'dashboard.html' %}
{% load static %}

{% block content %}
<div class="container">
    <h1>{% if form.instance.pk %}Edit Category{% else %}Add Category{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {% for forms in form %}
        
        {% endfor %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Save</button>
        <a href="{% url 'category_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
