{% extends 'frontend.html' %}

{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 text-center">
          <h1 class="h4 text-warning mb-2">Pago cancelado</h1>
          {% if has_order %}
            <p class="text-muted mb-4">Puedes retomar el pago o revisar tu orden.</p>
            <div class="d-flex justify-content-center gap-2">
              <a class="btn btn-outline-primary" href="{% url 'shop:order_detail' order_id=order_id %}">Ver mi orden</a>
              <a class="btn btn-primary" href="{% url 'payments:start_order_checkout' order_id=order_id %}">Pagar ahora</a>
            </div>
          {% else %}
            <p class="text-muted mb-4">No encontramos una orden reciente en esta sesión.</p>
            <a class="btn btn-primary" href="{{ fallback_url }}">Volver a la tienda</a>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
