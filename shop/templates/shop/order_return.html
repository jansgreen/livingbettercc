{% extends 'dashboard.html' %}
{% block content %}
<div class="container py-4">
  <h1 class="mb-3">Pago completado</h1>
  {% if has_order %}
    <p>Tu orden fue procesada correctamente.</p>
    <a class="btn btn-success" href="{% url 'shop:order_detail' order_id=order_id %}">Ver mi orden</a>
  {% else %}
    <p>No encontramos una orden reciente en esta sesión.</p>
    <a class="btn btn-primary" href="{{ fallback_url }}">Volver a la tienda</a>
  {% endif %}
</div>
{% endblock %}
