{% extends 'frontend.html' %}
{% load static %}

{% block content %}
<h1>Eliminar Producto</h1>
<p>¿Estás seguro de que quieres eliminar el producto "{{ product.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Eliminar</button>
    <a href="{% url 'product_list' %}">Cancelar</a>
</form>
{% endblock %}
