{% extends 'frontend.html' %}
{% load static %}

{% block content %}
    <div class="album py-5">
        <div class="container">
            <h1 class="mb-4 text-center">Detalles del Curso</h1>
            <div class="row">
                <div class="col-md-8 offset-md-2">
                    <div class="card">
                        <div class="card-body">
                                {% if product.image %}
                                    <img src="{{ product.image.url }}" class="bd-placeholder-img card-img-top" alt="{{ product.title }}">
                                {% else %}
                                    <svg aria-label="Placeholder: Thumbnail" class="bd-placeholder-img card-img-top" height="225" preserveAspectRatio="xMidYMid slice" role="img" width="100%" xmlns="http://www.w3.org/2000/svg">
                                        <title>{{ product.title }}</title>
                                        <rect width="100%" height="100%" fill="#55595c"></rect>
                                        <text x="50%" y="50%" fill="#eceeef" dy=".3em">Thumbnail</text>
                                    </svg>
                                {% endif %}
                            <h5 class="card-title">{{ product.name }}</h5>
                            <p class="card-text">{{ product.description|safe }}</p>
                            <p class="card-text"><strong>Precio:</strong> {{ product.price }}</p>
                            <a href="{% url 'add_to_cart' product.id 1 %}" class="btn btn-primary">Agregar al Carrito</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

{% endblock %}
